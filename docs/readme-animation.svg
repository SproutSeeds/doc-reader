<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Doc Reader local GPU speech workflow</title>
  <desc id="desc">Doc Reader reads documents with local 4090 Kokoro, captures Option-key dictation with local 4090 Whisper, and saves everything into a Library with Signal Map analysis.</desc>
  <style>
    svg {
      background: #f7f8f6;
      color: #151716;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .panel {
      fill: #ffffff;
      stroke: #d6ddd7;
      stroke-width: 1.5;
      filter: drop-shadow(0 16px 26px rgb(25 34 29 / .14));
    }

    .panel-dark {
      fill: #191d1b;
      stroke: #303832;
      stroke-width: 1.5;
      filter: drop-shadow(0 16px 26px rgb(25 34 29 / .18));
    }

    .bar { fill: #242a26; }
    .dot-red { fill: #ff5f57; }
    .dot-yellow { fill: #ffbd2e; }
    .dot-green { fill: #28c840; }
    .title-text { fill: #d8ded9; font-size: 13px; font-weight: 700; letter-spacing: 0; }
    .h1 { fill: #151716; font-size: 25px; font-weight: 800; letter-spacing: 0; }
    .h2 { fill: #151716; font-size: 16px; font-weight: 800; letter-spacing: 0; }
    .h2-light { fill: #f4f7f4; font-size: 16px; font-weight: 800; letter-spacing: 0; }
    .body { fill: #4d5851; font-size: 13px; font-weight: 600; letter-spacing: 0; }
    .body-light { fill: #d6ded8; font-size: 13px; font-weight: 600; letter-spacing: 0; }
    .small { fill: #66736b; font-size: 11px; font-weight: 700; letter-spacing: 0; }
    .small-light { fill: #aeb9b2; font-size: 11px; font-weight: 700; letter-spacing: 0; }
    .mono { font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; letter-spacing: 0; }
    .green { fill: #1b8f5a; }
    .blue { fill: #2270c5; }
    .amber { fill: #a76d13; }
    .red { fill: #c84235; }

    .card {
      fill: #f8faf8;
      stroke: #dce4de;
      stroke-width: 1.2;
    }

    .chip {
      fill: #edf5ef;
      stroke: #c9dbcf;
      stroke-width: 1;
    }

    .gpu-chip {
      fill: #222a25;
      stroke: #4b5a50;
      stroke-width: 1;
    }

    .arrow {
      fill: none;
      stroke: #2b8060;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 12 10;
      animation: arrow-flow 7s linear infinite;
    }

    .arrow-blue {
      stroke: #2e75bd;
      animation-delay: -2.5s;
    }

    .reading-card {
      animation: reading-pulse 10s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .dictation-card {
      animation: dictation-pulse 10s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .gpu-light {
      animation: gpu-light 10s ease-in-out infinite;
    }

    .wave {
      fill: none;
      stroke: #20a46b;
      stroke-width: 4;
      stroke-linecap: round;
      animation: wave-draw 10s ease-in-out infinite;
      stroke-dasharray: 140;
      stroke-dashoffset: 140;
    }

    .meter-fill {
      fill: #24b36b;
      animation: meter-grow 10s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: left;
    }

    .recording-hud {
      animation: hud-show 10s ease-in-out infinite;
      opacity: 0;
      transform: translateY(8px);
    }

    .signal-bar-a { animation: signal-a 10s ease-in-out infinite; transform-box: fill-box; transform-origin: bottom; }
    .signal-bar-b { animation: signal-b 10s ease-in-out infinite; transform-box: fill-box; transform-origin: bottom; }
    .signal-bar-c { animation: signal-c 10s ease-in-out infinite; transform-box: fill-box; transform-origin: bottom; }

    @keyframes arrow-flow {
      to { stroke-dashoffset: -44; }
    }

    @keyframes reading-pulse {
      0%, 9%, 42%, 100% { filter: none; transform: scale(1); }
      13%, 35% { filter: drop-shadow(0 0 12px rgb(36 179 107 / .45)); transform: scale(1.01); }
    }

    @keyframes dictation-pulse {
      0%, 43%, 84%, 100% { filter: none; transform: scale(1); }
      50%, 73% { filter: drop-shadow(0 0 12px rgb(46 117 189 / .45)); transform: scale(1.01); }
    }

    @keyframes gpu-light {
      0%, 11%, 82%, 100% { fill: #4b5a50; }
      17%, 36% { fill: #24b36b; }
      51%, 74% { fill: #3e9df0; }
    }

    @keyframes wave-draw {
      0%, 15%, 100% { stroke-dashoffset: 140; opacity: 0; }
      22%, 38% { stroke-dashoffset: 0; opacity: 1; }
      45% { opacity: 0; }
    }

    @keyframes meter-grow {
      0%, 45%, 100% { transform: scaleX(.08); }
      51% { transform: scaleX(.42); }
      57% { transform: scaleX(.93); }
      63% { transform: scaleX(.28); }
      70% { transform: scaleX(.74); }
      78% { transform: scaleX(.52); }
    }

    @keyframes hud-show {
      0%, 43%, 86%, 100% { opacity: 0; transform: translateY(8px); }
      49%, 78% { opacity: 1; transform: translateY(0); }
    }

    @keyframes signal-a {
      0%, 78%, 100% { transform: scaleY(.35); }
      86%, 96% { transform: scaleY(.86); }
    }

    @keyframes signal-b {
      0%, 78%, 100% { transform: scaleY(.48); }
      86%, 96% { transform: scaleY(1); }
    }

    @keyframes signal-c {
      0%, 78%, 100% { transform: scaleY(.3); }
      86%, 96% { transform: scaleY(.72); }
    }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2b8060"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2e75bd"/>
    </marker>
  </defs>

  <rect class="panel" x="28" y="28" width="904" height="364" rx="18"/>
  <path class="bar" d="M46 28h868c10 0 18 8 18 18v36H28V46c0-10 8-18 18-18z"/>
  <circle class="dot-red" cx="57" cy="55" r="6"/>
  <circle class="dot-yellow" cx="80" cy="55" r="6"/>
  <circle class="dot-green" cx="103" cy="55" r="6"/>
  <text class="title-text" x="480" y="60" text-anchor="middle">Doc Reader - local GPU speech workspace</text>

  <text class="h1" x="58" y="118">Read, dictate, analyze locally</text>
  <text class="body" x="58" y="144">Strict 4090 Kokoro TTS + 4090 Whisper STT feed one durable Library.</text>

  <rect class="panel" x="58" y="171" width="250" height="142" rx="12"/>
  <text class="h2" x="78" y="202">Mac capture</text>
  <rect class="chip" x="78" y="218" width="82" height="26" rx="13"/>
  <text class="small green" x="119" y="236" text-anchor="middle">Right Cmd</text>
  <rect class="chip" x="170" y="218" width="94" height="26" rx="13"/>
  <text class="small blue" x="217" y="236" text-anchor="middle">Option hold</text>
  <text class="body" x="78" y="267">Selected text and microphone audio</text>
  <text class="body" x="78" y="288">stay inside the local app flow.</text>

  <g class="recording-hud">
    <rect class="panel-dark" x="72" y="327" width="242" height="50" rx="12"/>
    <circle class="dot-red" cx="93" cy="346" r="5"/>
    <text class="small-light" x="107" y="350">DocReader recording...</text>
    <circle cx="290" cy="346" r="11" fill="#2c3430" stroke="#59645d"/>
    <text class="small-light" x="290" y="350" text-anchor="middle">x</text>
    <rect x="92" y="361" width="190" height="5" rx="2.5" fill="#5b655f"/>
    <rect class="meter-fill" x="92" y="361" width="190" height="5" rx="2.5"/>
  </g>

  <path class="arrow" d="M322 240 C360 214 383 214 421 240" marker-end="url(#arrowhead)"/>
  <path class="arrow arrow-blue" d="M421 274 C384 305 354 306 318 276" marker-end="url(#arrowhead-blue)"/>

  <rect class="panel" x="420" y="149" width="256" height="206" rx="14"/>
  <text class="h2" x="444" y="181">Library</text>
  <rect class="chip" x="578" y="163" width="72" height="26" rx="13"/>
  <text class="small green" x="614" y="181" text-anchor="middle">Signal Map</text>

  <g class="reading-card">
    <rect class="card" x="444" y="200" width="208" height="42" rx="8"/>
    <circle class="green" cx="462" cy="221" r="7"/>
    <text class="body" x="478" y="218">Reading card</text>
    <text class="small" x="478" y="234">Kokoro playback prepared</text>
  </g>

  <g class="dictation-card">
    <rect class="card" x="444" y="252" width="208" height="42" rx="8"/>
    <circle class="blue" cx="462" cy="273" r="7"/>
    <text class="body" x="478" y="270">Dictation card</text>
    <text class="small" x="478" y="286">Whisper text copied or inserted</text>
  </g>

  <rect class="card" x="444" y="304" width="208" height="32" rx="8"/>
  <rect class="signal-bar-a green" x="462" y="315" width="8" height="15" rx="3"/>
  <rect class="signal-bar-b blue" x="478" y="309" width="8" height="21" rx="3"/>
  <rect class="signal-bar-c amber" x="494" y="318" width="8" height="12" rx="3"/>
  <text class="small" x="518" y="324">STT / TTS / open</text>

  <path class="arrow" d="M686 222 C716 190 738 186 768 206" marker-end="url(#arrowhead)"/>
  <path class="arrow arrow-blue" d="M768 282 C738 308 716 303 686 270" marker-end="url(#arrowhead-blue)"/>

  <rect class="panel-dark" x="724" y="139" width="184" height="216" rx="14"/>
  <text class="h2-light" x="750" y="173">Umbra 4090</text>
  <text class="small-light" x="750" y="195">Local GPU speech service</text>

  <rect class="gpu-chip" x="750" y="216" width="132" height="30" rx="8"/>
  <circle class="gpu-light" cx="769" cy="231" r="6"/>
  <text class="body-light" x="784" y="236">Kokoro TTS</text>

  <rect class="gpu-chip" x="750" y="258" width="132" height="30" rx="8"/>
  <circle class="gpu-light" cx="769" cy="273" r="6"/>
  <text class="body-light" x="784" y="278">Whisper STT</text>

  <rect class="gpu-chip" x="750" y="300" width="132" height="30" rx="8"/>
  <circle class="gpu-light" cx="769" cy="315" r="6"/>
  <text class="body-light" x="784" y="320">Ollama map</text>

  <path class="wave" d="M764 111c14-20 25 20 39 0s25 20 39 0 25 20 39 0"/>
  <text class="small" x="58" y="372">Default path: local GPU speech. Optional OpenAI backend is explicit and key-controlled.</text>
</svg>
